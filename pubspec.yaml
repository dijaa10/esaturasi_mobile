name: esaturasi
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Network
  http: ^1.3.0
  dio: ^5.7.0

  # Storage & File
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1
  file_picker: ^8.1.7

  # Permission & Device
  permission_handler: ^12.0.0+1
  device_info_plus: ^10.1.0

  # UI & Media
  cached_network_image: ^3.4.1
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  flutter_native_splash: ^2.4.1

  # Date & Time
  intl: ^0.19.0
  timeago: ^3.6.0
  table_calendar: ^3.1.2

  # File Viewer
  open_file: ^3.5.4
  flutter_pdfview: ^1.3.2

  # HTML & Text
  flutter_html: ^3.0.0-beta.2
  html_unescape: ^2.0.0

  # Share & URL
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/logosmk.png